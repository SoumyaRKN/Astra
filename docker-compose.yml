# Docker Compose - Development & Local Orchestration
# Complete stack: Backend, Frontend, PostgreSQL, Ollama
# Latest version compatible with Docker Compose v5.1+

services:
  # Ollama LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: personal-ai-ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_ORIGINS=*
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - personal-ai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: personal-ai-db
    environment:
      POSTGRES_USER: ${DB_USER:-personal_ai}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
      POSTGRES_DB: ${DB_NAME:-personal_assistant}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - personal-ai
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-personal_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend FastAPI Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: personal-ai-backend
    ports:
      - "8000:8000"
    environment:
      # App Configuration
      APP_NAME: "Personal AI Assistant"
      APP_VERSION: "0.1.0"
      ENVIRONMENT: ${ENVIRONMENT:-production}
      
      # Ollama Configuration
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral:3b-instruct-q4_K_M}
      OLLAMA_TIMEOUT: 300
      
      # Database Configuration
      DATABASE_URL: postgresql://${DB_USER:-personal_ai}:${DB_PASSWORD:-changeme123}@db:5432/${DB_NAME:-personal_assistant}
      
      # LLM Configuration
      LLM_CONTEXT_LENGTH: 2048
      LLM_TEMPERATURE: 0.7
      LLM_MAX_TOKENS: 512
      LLM_TOP_P: 0.95
      
      # CORS Configuration
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000", "http://localhost:8080"]}
      
      # Security
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      API_KEY_ENABLED: ${API_KEY_ENABLED:-false}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    
    depends_on:
      ollama:
        condition: service_healthy
      db:
        condition: service_healthy
    
    volumes:
      - ./backend:/app
      - backend-cache:/app/.cache
      - assets:/app/assets
    
    networks:
      - personal-ai
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Next.js Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: personal-ai-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
      NEXT_PUBLIC_ENVIRONMENT: ${NEXT_PUBLIC_ENVIRONMENT:-production}
    
    depends_on:
      backend:
        condition: service_healthy
    
    volumes:
      - ./frontend:/app
      - /app/.next
      - /app/node_modules
    
    networks:
      - personal-ai
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres-data:
    driver: local
  ollama-data:
    driver: local
  backend-cache:
    driver: local
  assets:
    driver: local

networks:
  personal-ai:
    driver: bridge
